services:
  - type: web
    name: fenmo-expense-tracker
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --include=dev && npm run render-build
    startCommand: npm run render-start
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fenmo-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: fenmo-postgres
    plan: free
    region: singapore
    databaseName: fenmo
